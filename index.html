<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Link</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000a12; color: #3db9ff; font-family: 'Share Tech Mono', monospace; min-height: 100vh; }
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
.scanline { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,100,180,0.015) 2px, rgba(0,100,180,0.015) 4px); pointer-events: none; z-index: 0; }
.container { max-width: 480px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
.header { text-align: center; margin-bottom: 24px; padding-top: 10px; }
.header h1 { font-size: 22px; letter-spacing: 6px; color: #3db9ff; text-transform: uppercase; }
.header .sub { font-size: 11px; color: #1a6a9a; letter-spacing: 3px; margin-top: 4px; }
.hex-border { border: 1px solid #0d4a70; border-radius: 4px; padding: 14px; margin-bottom: 14px; background: rgba(0,20,40,0.7); position: relative; }
.hex-border::before { content: ''; position: absolute; top: -1px; left: 20px; width: 40px; height: 2px; background: #3db9ff; }
.section-title { font-size: 10px; letter-spacing: 3px; color: #1a6a9a; margin-bottom: 12px; text-transform: uppercase; }
.portal-wrap { display: flex; justify-content: center; margin: 8px 0; }
.portal-ring { position: relative; width: 220px; height: 220px; }
.portal-ring svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
.reso-btn { position: absolute; width: 36px; height: 36px; border-radius: 50%; border: 1px solid #0d4a70; background: #000a12; color: #3db9ff; font-family: 'Share Tech Mono', monospace; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transform: translate(-50%, -50%); transition: all 0.2s; }
.reso-btn:hover { border-color: #3db9ff; background: #001830; }
.reso-btn.level-0 { color: #0d2a3a; border-color: #061520; }
.reso-btn.level-1 { border-color: #fece5a; color: #fece5a; }
.reso-btn.level-2 { border-color: #ffa630; color: #ffa630; }
.reso-btn.level-3 { border-color: #ff7315; color: #ff7315; }
.reso-btn.level-4 { border-color: #e40066; color: #e40066; }
.reso-btn.level-5 { border-color: #fe5f55; color: #fe5f55; }
.reso-btn.level-6 { border-color: #77cd2e; color: #77cd2e; }
.reso-btn.level-7 { border-color: #00bbf9; color: #00bbf9; }
.reso-btn.level-8 { border-color: #9b5de5; color: #9b5de5; }
.faction-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.faction-btn { padding: 12px; border-radius: 3px; border: 1px solid; background: transparent; font-family: 'Share Tech Mono', monospace; font-size: 13px; letter-spacing: 2px; cursor: pointer; text-transform: uppercase; transition: all 0.2s; }
.faction-btn.enl { border-color: #00ff00; color: #00ff00; }
.faction-btn.res { border-color: #3db9ff; color: #3db9ff; }
.faction-btn.mac { border-color: #ff0000; color: #ff0000; }
.faction-btn.neu { border-color: #aaaaaa; color: #aaaaaa; }
.faction-btn.enl.active { background: rgba(0,255,0,0.1); }
.faction-btn.res.active { background: rgba(61,185,255,0.1); }
.faction-btn.mac.active { background: rgba(255,0,0,0.1); }
.faction-btn.neu.active { background: rgba(170,170,170,0.1); }
.toggle-row { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; }
.toggle-label { font-size: 11px; letter-spacing: 2px; color: #1a6a9a; }
.toggle { position: relative; width: 48px; height: 24px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #001830; border: 1px solid #0d4a70; border-radius: 24px; transition: 0.3s; }
.toggle-slider:before { position: absolute; content: ''; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #0d4a70; border-radius: 50%; transition: 0.3s; }
input:checked + .toggle-slider { border-color: #3db9ff; }
input:checked + .toggle-slider:before { transform: translateX(24px); background: #3db9ff; }
.slider-row { margin: 10px 0; }
.slider-row label { font-size: 10px; letter-spacing: 2px; color: #1a6a9a; display: block; margin-bottom: 6px; }
.slider-row input[type=range] { width: 100%; height: 4px; appearance: none; background: #0d4a70; border-radius: 2px; outline: none; }
.slider-row input[type=range]::-webkit-slider-thumb { appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #3db9ff; cursor: pointer; }
.rgb-row { display: flex; align-items: center; gap: 10px; margin: 6px 0; }
.rgb-row span { font-size: 11px; width: 10px; }
.rgb-row input[type=range] { flex: 1; height: 4px; appearance: none; border-radius: 2px; outline: none; }
.rgb-row input[type=range]::-webkit-slider-thumb { appearance: none; width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
.rgb-r input { background: linear-gradient(to right, #000, #f00); }
.rgb-r input::-webkit-slider-thumb { background: #f00; }
.rgb-g input { background: linear-gradient(to right, #000, #0f0); }
.rgb-g input::-webkit-slider-thumb { background: #0f0; }
.rgb-b input { background: linear-gradient(to right, #000, #3db9ff); }
.rgb-b input::-webkit-slider-thumb { background: #3db9ff; }
.rgb-val { font-size: 11px; min-width: 30px; text-align: right; color: #3db9ff; }
.status-bar { text-align: center; font-size: 10px; letter-spacing: 2px; padding: 8px; margin-top: 14px; border: 1px solid #0d4a70; border-radius: 3px; color: #1a6a9a; }
.status-bar.ok { color: #00ff00; border-color: #00ff00; }
.status-bar.err { color: #ff0000; border-color: #ff0000; }
.status-bar.sending { color: #ffa630; border-color: #ffa630; }
.corner-tl, .corner-br { position: absolute; width: 12px; height: 12px; }
.corner-tl { top: 4px; left: 4px; border-top: 1px solid #3db9ff; border-left: 1px solid #3db9ff; }
.corner-br { bottom: 4px; right: 4px; border-bottom: 1px solid #3db9ff; border-right: 1px solid #3db9ff; }
.auto-indicator { text-align: center; font-size: 10px; letter-spacing: 2px; color: #ffa630; margin-top: 6px; display: none; }
.joydiv-btn { background: none; border: 1px solid #061520; color: #1a3a4a; border-radius: 3px; font-family: 'Share Tech Mono', monospace; font-size: 10px; padding: 6px 12px; cursor: pointer; display: block; margin: 10px auto 0; letter-spacing: 2px; }
.joydiv-btn:hover { color: #3db9ff; border-color: #0d4a70; }
</style>
</head>
<body>
<div class="scanline"></div>
<div class="container">
  <div class="header">
    <h1>Portal Link</h1>
    <div class="sub">XM Controller v2.0 // RES</div>
  </div>

  <div class="hex-border">
    <div class="corner-tl"></div><div class="corner-br"></div>
    <div class="toggle-row">
      <span class="toggle-label">Manuális</span>
      <label class="toggle"><input type="checkbox" id="autoToggle" checked onchange="setAuto(this.checked)"><span class="toggle-slider"></span></label>
      <span class="toggle-label">Auto</span>
    </div>
    <div class="auto-indicator" id="autoIndicator">// IITC adatra vár...</div>
  </div>

  <div class="hex-border">
    <div class="corner-tl"></div><div class="corner-br"></div>
    <div class="section-title">Frakció</div>
    <div class="faction-grid">
      <button class="faction-btn enl" onclick="setFaction('E')">ENL</button>
      <button class="faction-btn res active" onclick="setFaction('R')">RES</button>
      <button class="faction-btn mac" onclick="setFaction('M')">MAC</button>
      <button class="faction-btn neu" onclick="setFaction('N')">NEU</button>
    </div>
  </div>

  <div class="hex-border">
    <div class="corner-tl"></div><div class="corner-br"></div>
    <div class="section-title">Rezonátorok</div>
    <div class="portal-wrap">
      <div class="portal-ring" id="portalRing">
        <svg viewBox="0 0 220 220">
          <circle cx="110" cy="110" r="90" fill="none" stroke="#0d4a70" stroke-width="0.5" stroke-dasharray="4 4"/>
          <circle cx="110" cy="110" r="60" fill="none" stroke="#061520" stroke-width="0.5"/>
          <circle cx="110" cy="110" r="20" fill="none" stroke="#0d4a70" stroke-width="1"/>
          <circle cx="110" cy="110" r="6" fill="#3db9ff" opacity="0.5"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="hex-border">
    <div class="corner-tl"></div><div class="corner-br"></div>
    <div class="section-title">Megjelenítés</div>
    <div class="toggle-row">
      <span class="toggle-label">Tónus</span>
      <label class="toggle"><input type="checkbox" id="colorModeToggle" onchange="sendSettings()"><span class="toggle-slider"></span></label>
      <span class="toggle-label">Rezó szín</span>
    </div>
    <div class="slider-row">
      <label>Fényerő</label>
      <input type="range" min="10" max="255" value="150" id="brightness" oninput="sendSettings()">
    </div>
    <div class="slider-row">
      <label>Pulzálás</label>
      <input type="range" min="0" max="120" value="70" id="pulse" oninput="sendSettings()">
    </div>
  </div>

  <div class="hex-border">
    <div class="corner-tl"></div><div class="corner-br"></div>
    <div class="section-title">Színkeverő</div>
    <div class="rgb-row rgb-r">
      <span>R</span>
      <input type="range" min="0" max="255" value="0" id="rSlider" oninput="updateRGB()">
      <span class="rgb-val" id="rVal">0</span>
    </div>
    <div class="rgb-row rgb-g">
      <span>G</span>
      <input type="range" min="0" max="255" value="0" id="gSlider" oninput="updateRGB()">
      <span class="rgb-val" id="gVal">0</span>
    </div>
    <div class="rgb-row rgb-b">
      <span>B</span>
      <input type="range" min="0" max="255" value="255" id="bSlider" oninput="updateRGB()">
      <span class="rgb-val" id="bVal">255</span>
    </div>
  </div>

  <div class="status-bar" id="statusBar">// Kapcsolódás...</div>
  <button class="joydiv-btn" onclick="playJoy()">Örömóda</button>
</div>

<script>
const firebaseConfig = {
  databaseURL: "https://dorjanportal-default-rtdb.europe-west1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let levels = [8,8,8,8,8,8,8,8];
let currentFaction = 'R';
let autoMode = true;
let rgbDebounce = null;
let settingsDebounce = null;

const positions = [
  [50,10],[82,22],[90,50],[82,78],
  [50,90],[18,78],[10,50],[18,22]
];

function buildRing() {
  const ring = document.getElementById('portalRing');
  positions.forEach((pos, i) => {
    const btn = document.createElement('button');
    btn.className = 'reso-btn level-' + levels[i];
    btn.style.left = pos[0] + '%';
    btn.style.top = pos[1] + '%';
    btn.textContent = levels[i];
    btn.onclick = () => { if (!autoMode) cycleLevel(i); };
    ring.appendChild(btn);
  });
}

function updateRing() {
  const btns = document.querySelectorAll('.reso-btn');
  btns.forEach((btn, i) => {
    btn.className = 'reso-btn level-' + levels[i];
    btn.textContent = levels[i];
  });
}

function cycleLevel(i) {
  levels[i] = (levels[i] + 1) % 9;
  updateRing();
  sendData();
}

function setFaction(f) {
  if (autoMode) return;
  currentFaction = f;
  updateFactionUI(f);
  if (f === 'N') levels = [8,8,8,8,8,8,8,8];
  sendData();
}

function updateFactionUI(f) {
  document.querySelectorAll('.faction-btn').forEach(b => b.classList.remove('active'));
  const map = {E:'enl', R:'res', M:'mac', N:'neu'};
  document.querySelector('.faction-btn.' + map[f]).classList.add('active');
}

function setAuto(val) {
  autoMode = val;
  const indicator = document.getElementById('autoIndicator');
  indicator.style.display = val ? 'block' : 'none';
  sendSettings();
}

function sendSettings() {
  clearTimeout(settingsDebounce);
  settingsDebounce = setTimeout(() => {
    db.ref('settings').update({
      brightness: parseInt(document.getElementById('brightness').value),
      pulseDepth: parseInt(document.getElementById('pulse').value),
      colorMode: document.getElementById('colorModeToggle').checked,
      autoMode: autoMode
    }).then(() => setStatus('ok', 'Beállítások elmentve'))
      .catch(() => setStatus('err', 'Hiba!'));
  }, 300);
}

function updateRGB() {
  const r = document.getElementById('rSlider').value;
  const g = document.getElementById('gSlider').value;
  const b = document.getElementById('bSlider').value;
  document.getElementById('rVal').textContent = r;
  document.getElementById('gVal').textContent = g;
  document.getElementById('bVal').textContent = b;
  clearTimeout(rgbDebounce);
  rgbDebounce = setTimeout(() => {
    db.ref('settings').update({customR: parseInt(r), customG: parseInt(g), customB: parseInt(b)})
      .then(() => setStatus('ok', 'Szín elmentve'))
      .catch(() => setStatus('err', 'Hiba!'));
  }, 300);
}

function sendData() {
  setStatus('sending', 'Küldés...');
  db.ref('portal_status').set({
    team: currentFaction,
    resCount: levels.filter(l => l > 0).length,
    levels: levels
  }).then(() => setStatus('ok', 'Elküldve // ' + currentFaction + ' // ' + levels.join(',')))
    .catch(() => setStatus('err', 'Firebase hiba!'));
}

function setStatus(type, msg) {
  const bar = document.getElementById('statusBar');
  bar.className = 'status-bar ' + type;
  bar.textContent = '// ' + msg;
}

function playJoy() {
  db.ref('settings').update({playJoy: Date.now()})
    .then(() => setStatus('ok', 'Örömóda elindítva!'))
    .catch(() => setStatus('err', 'Hiba!'));
}

// Realtime listener - auto módban frissíti a UI-t
db.ref('portal_status').on('value', (snapshot) => {
  const data = snapshot.val();
  if (!data) { setStatus('ok', 'Kapcsolódva'); return; }
  if (autoMode) {
    currentFaction = data.team || 'N';
    if (data.levels) {
      if (Array.isArray(data.levels)) {
        levels = data.levels;
      } else {
        levels = Object.values(data.levels);
      }
    }
    updateFactionUI(currentFaction);
    updateRing();
    setStatus('ok', 'Auto // ' + currentFaction + ' // ' + levels.join(','));
  } else {
    setStatus('ok', 'Kapcsolódva // Manuális mód');
  }
});

buildRing();
setAuto(true);
</script>
</body>
</html>
